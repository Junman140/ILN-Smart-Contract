[changelog]
header = """
# Changelog

All notable changes to the ILN SDK (`@iln/sdk`) will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

This file is auto-generated by [git-cliff](https://github.com/orhun/git-cliff).
To regenerate: `cd sdk && git-cliff --config .cliff.toml`\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
footer = """
{% for release in releases %}\
{% if release.version %}\
{% if release.previous.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/Invoice-Liquidity-Network/ILN-Smart-Contract/compare/{{ release.previous.version }}...{{ release.version }}
{% endif %}\
{% else %}\
[Unreleased]: https://github.com/Invoice-Liquidity-Network/ILN-Smart-Contract/compare/\
  {{ release.previous.version | default(value="HEAD") }}...HEAD
{% endif %}\
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat\\(sdk\\)", group = "Features" },
  { message = "^fix\\(sdk\\)", group = "Bug Fixes" },
  { message = "^refactor\\(sdk\\)", group = "Refactoring" },
  { message = "^perf\\(sdk\\)", group = "Performance" },
  { message = "^test\\(sdk\\)", group = "Tests" },
  { message = "^docs\\(sdk\\)", group = "Documentation" },
  { message = "^chore\\(sdk\\)", group = "Miscellaneous", skip = true },
  { message = "^merge", skip = true },
]
filter_commits = true
tag_pattern = "sdk-v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
include_path = "sdk/**/*"
