name: SDK Integration (testnet)

on:
  schedule:
    # Nightly at 03:00 UTC.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: namespace-profile-nursca
    defaults:
      run:
        working-directory: sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests against testnet
        run: pnpm --filter @iln/sdk run test:integration
        env:
          TEST_SUBMITTER_SECRET: ${{ secrets.TEST_SUBMITTER_SECRET }}
          TEST_LP_SECRET: ${{ secrets.TEST_LP_SECRET }}
