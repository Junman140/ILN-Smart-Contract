name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Pre-flight check for external Stellar testnet availability. Emits a warning
  # when the network is unavailable and sets the `healthy` job output. This
  # allows downstream integration tests to be skipped gracefully.
  testnet-health:
    runs-on: ubuntu-latest
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
    steps:
      - name: Check Stellar Horizon testnet
        id: check
        run: |
          set -e
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://horizon-testnet.stellar.org/ || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "::warning::Stellar Horizon testnet unreachable (status $STATUS). Integration tests will be skipped."
          fi
        shell: bash

  # TypeScript workspace tests using Turborepo for caching and parallel execution
  typescript-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run typecheck (Turbo)
        run: npm run typecheck

      - name: Run build (Turbo)
        run: npm run build

      - name: Run tests (Turbo)
        run: npm run test:ci

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: typescript-coverage
          path: |
            sdk/coverage/
            indexer/coverage/
            notifications/coverage/
            cli/coverage/

  # Unit / workspace tests that do not require the external testnet.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit/workspace tests (no external network)
        run: |
          cargo test --workspace --lib

  # Integration tests that require the Stellar testnet. This job depends on the
  # `testnet-health` check and will be skipped (not failed) when the testnet is
  # unavailable.
  integration:
    needs: testnet-health
    runs-on: ubuntu-latest
    if: needs.testnet-health.outputs.healthy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run integration tests against testnet
        run: |
          cargo test --workspace --tests --all

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Clippy (zero warnings)
        run: cargo clippy --all-targets -- -D warnings

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          target: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Check benchmark regression (warn only)
        continue-on-error: true
        run: |
          chmod +x scripts/check_benchmark_regression.sh
          bash scripts/check_benchmark_regression.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run coverage for invoice_liquidity
        run: |
          cargo tarpaulin -p invoice_liquidity \
            --out Xml --output-dir coverage \
            --fail-under 95 \
            --exclude-files 'contracts/invoice_liquidity/src/tests_*' \
            --exclude-files 'contracts/invoice_liquidity/src/test.rs'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml

  # Snyk vulnerability scanning for npm packages across all monorepo packages.
  snyk:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities (SDK)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=sdk/package.json --severity-threshold=high

      - name: Run Snyk to check for vulnerabilities (CLI)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=cli/package.json --severity-threshold=high

      - name: Run Snyk to check for vulnerabilities (Indexer)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=indexer/package.json --severity-threshold=high

      - name: Run Snyk to check for vulnerabilities (Notifications)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=notifications/package.json --severity-threshold=high

      - name: Run Snyk to check for vulnerabilities (E2E Tests)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=tests/e2e/package.json --severity-threshold=high

      - name: Upload Snyk results as PR comment
        uses: snyk/actions/node@master
        if: always()
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --all-projects --severity-threshold=high
