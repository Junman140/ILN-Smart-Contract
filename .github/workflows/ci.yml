name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  typescript-tests:
    if: ${{ false }}
    runs-on: namespace-profile-nursca
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run lint (Turbo)
        run: pnpm run lint

      - name: Run typecheck (Turbo)
        run: pnpm run typecheck

      - name: Run build (Turbo)
        run: pnpm run build

      - name: Check SDK bundle size budget
        run: pnpm --filter @iln/sdk exec size-limit

      - name: Run tests (Turbo)
        run: pnpm run test:ci

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: typescript-coverage
          path: |
            sdk/coverage/
            indexer/coverage/
            notifications/coverage/
            cli/coverage/

  test:
    if: ${{ false }}
    runs-on: namespace-profile-nursca
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit/workspace tests (no external network)
        run: |
          cargo test --workspace --lib

  integration:
    if: ${{ false }}
    runs-on: namespace-profile-nursca
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run integration tests against testnet
        run: |
          cargo test --workspace --tests --all

  fmt:
    runs-on: namespace-profile-nursca
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    if: ${{ false }}
    runs-on: namespace-profile-nursca
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Clippy (zero warnings)
        run: cargo clippy --all-targets -- -D warnings

  benchmarks:
    runs-on: namespace-profile-nursca
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          target: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Check benchmark regression (warn only)
        continue-on-error: true
        run: |
          chmod +x scripts/check_benchmark_regression.sh
          bash scripts/check_benchmark_regression.sh

  coverage:
    if: ${{ false }}
    runs-on: namespace-profile-nursca
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run coverage for invoice_liquidity
        run: |
          cargo tarpaulin -p invoice_liquidity \
            --out Xml --output-dir coverage \
            --fail-under 95 \
            --exclude-files 'contracts/invoice_liquidity/src/tests_*' \
            --exclude-files 'contracts/invoice_liquidity/src/test.rs'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml

  snyk:
    if: ${{ false }}
    runs-on: namespace-profile-nursca
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities (SDK)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=sdk/package.json --severity-threshold=high

      - name: Run Snyk to check for vulnerabilities (CLI)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=cli/package.json --severity-threshold=high

      - name: Run Snyk to check for vulnerabilities (Indexer)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=indexer/package.json --severity-threshold=high

      - name: Run Snyk to check for vulnerabilities (Notifications)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=notifications/package.json --severity-threshold=high

      - name: Run Snyk to check for vulnerabilities (E2E Tests)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=tests/e2e/package.json --severity-threshold=high

      - name: Upload Snyk results as PR comment
        uses: snyk/actions/node@master
        if: always()
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --all-projects --severity-threshold=high
