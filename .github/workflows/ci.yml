name: CI Lint & Type-check

on:
  push:
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['sdk', 'cli', 'indexer', 'notifications']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Lint and Typecheck ${{ matrix.package }}
      run: pnpm --filter @iln/${{ matrix.package }} run lint && pnpm --filter @iln/${{ matrix.package }} run typecheck
